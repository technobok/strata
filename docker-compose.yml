# Strata - Docker Compose configuration
# Usage:
#   make rebuild           # after `git pull`: build images + apply DB migrations
#   make db-init           # apply DB migrations only (no rebuild)
#   docker compose up -d   # run app + worker

services:
  app:
    build: .
    container_name: strata-app
    volumes:
      - ./instance:/app/instance
      - ${STRATA_CACHE_DIR:-./instance/cache}:/cache-data
      - ${GATEKEEPER_INSTANCE:-../gatekeeper/instance}:/gatekeeper-data
      - ${OUTBOX_INSTANCE:-../outbox/instance}:/outbox-data
    ports:
      - "${PORT:-5000}:${PORT:-5000}"
    environment:
      # --- Runtime ---
      - PYTHONUNBUFFERED=1
      - TZ=${TZ:-UTC}

      # --- Listen address ---
      - PORT=${PORT:-5000}
      - HOST=${HOST:-0.0.0.0}

      # --- Strata DB (SQLite metadata store) ---
      # Defaults to /app/instance/strata.sqlite3 inside the container
      # - STRATA_DB=/app/instance/strata.sqlite3
      # - STRATA_ROOT=/app

      # --- Result cache (DuckDB files; can grow large) ---
      # Mount STRATA_CACHE_DIR (host path) above; container path is fixed.
      - CACHE_DIRECTORY=/cache-data

      # --- Gatekeeper (SSO auth — required to log in) ---
      - GATEKEEPER_DB=/gatekeeper-data/gatekeeper.sqlite3
      # Or HTTP mode instead of local DB:
      # - GATEKEEPER_URL=https://gatekeeper.example.com
      # - GATEKEEPER_API_KEY=...

      # --- Outbox (outgoing email queue) ---
      - OUTBOX_DB=/outbox-data/outbox.sqlite3
      # - MAIL_SENDER=strata@example.com

      # --- Reverse proxy (we run behind webreports-caddy at /strata) ---
      # PREFIX=1 makes url_for() prepend /strata so static URLs work behind
      # Caddy's handle_path /strata/*. Set to 0 if running standalone.
      - PROXY_X_FORWARDED_FOR=1
      - PROXY_X_FORWARDED_PROTO=1
      - PROXY_X_FORWARDED_HOST=1
      - PROXY_X_FORWARDED_PREFIX=1
    networks:
      - platform-net
    restart: unless-stopped
    healthcheck:
      test:
        - "CMD"
        - "python"
        - "-c"
        - "import os,urllib.request;urllib.request.urlopen(f'http://localhost:{os.environ.get(\"PORT\",\"5000\")}/')"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  worker:
    build: .
    container_name: strata-worker
    command: ["python", "-m", "worker.schedule_worker"]
    volumes:
      - ./instance:/app/instance
      - ${STRATA_CACHE_DIR:-./instance/cache}:/cache-data
      - ${GATEKEEPER_INSTANCE:-../gatekeeper/instance}:/gatekeeper-data
      - ${OUTBOX_INSTANCE:-../outbox/instance}:/outbox-data
    environment:
      # --- Runtime ---
      - PYTHONUNBUFFERED=1
      - TZ=${TZ:-UTC}

      # --- Strata DB (SQLite metadata store) ---
      # Defaults to /app/instance/strata.sqlite3 inside the container
      # - STRATA_DB=/app/instance/strata.sqlite3
      # - STRATA_ROOT=/app

      # --- Result cache (DuckDB files; can grow large) ---
      - CACHE_DIRECTORY=/cache-data

      # --- Gatekeeper (SSO auth) ---
      - GATEKEEPER_DB=/gatekeeper-data/gatekeeper.sqlite3
      # Or HTTP mode instead of local DB:
      # - GATEKEEPER_URL=https://gatekeeper.example.com
      # - GATEKEEPER_API_KEY=...

      # --- Outbox (outgoing email queue) ---
      - OUTBOX_DB=/outbox-data/outbox.sqlite3
      # - MAIL_SENDER=strata@example.com

      # --- Reverse proxy (matches app service; harmless for the worker) ---
      - PROXY_X_FORWARDED_FOR=1
      - PROXY_X_FORWARDED_PROTO=1
      - PROXY_X_FORWARDED_HOST=1
      - PROXY_X_FORWARDED_PREFIX=1
    networks:
      - platform-net
    restart: unless-stopped

networks:
  platform-net:
    external: true
